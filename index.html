<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>日本縦断モノポリー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F7F2E7;
    --paper: #FFFDF8;
    --ink: #1F2A44;
    --ink-soft: #5B6478;
    --gold: #C29A3B;
    --line: #DDD3BE;
    --danger: #C0392B;
    --safe: #3C8C5E;
    --brown:#8B5E3C; --cyan:#4FB3D9; --pink:#E38AAE; --orange:#E8823C;
    --red:#C0392B; --yellow:#DDB23C; --green:#3C8C5E; --navy:#2D4373;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:'Zen Kaku Gothic New',sans-serif; -webkit-tap-highlight-color:transparent;}
  h1,h2,h3{font-family:'Shippori Mincho',serif; margin:0 0 8px;}
  button{font-family:inherit; cursor:pointer;}
  input{font-family:inherit;}
  #app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
  .screen{display:none;padding:16px;padding-bottom:40px;}
  .screen.active{display:block;}

  /* ---- Title ---- */
  .brand{text-align:center;padding:36px 0 20px;}
  .brand .eyebrow{letter-spacing:.3em;font-size:11px;color:var(--gold);font-weight:700;}
  .brand h1{font-size:30px;line-height:1.3;}
  .brand .sub{color:var(--ink-soft);font-size:13px;margin-top:4px;}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px;
    box-shadow:0 1px 0 rgba(0,0,0,.03);}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;color:var(--ink-soft);margin-bottom:6px;}
  .field input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;font-size:16px;background:#fff;}
  .btn{display:block;width:100%;text-align:center;padding:14px;border-radius:10px;border:none;font-size:15px;font-weight:700;}
  .btn-primary{background:var(--ink);color:#fff;}
  .btn-gold{background:var(--gold);color:#fff;}
  .btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--line);}
  .btn-danger{background:var(--danger);color:#fff;}
  .btn[disabled]{opacity:.4;}
  .divider{display:flex;align-items:center;gap:10px;color:var(--ink-soft);font-size:12px;margin:18px 0;}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line);}
  .error{color:var(--danger);font-size:13px;margin-top:6px;min-height:16px;}

  /* ---- Lobby ---- */
  .roomcode{font-family:'Shippori Mincho',serif;font-size:34px;letter-spacing:.15em;text-align:center;color:var(--ink);}
  .roomcode-label{text-align:center;font-size:11px;color:var(--ink-soft);letter-spacing:.2em;}
  .player-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);}
  .player-row:last-child{border-bottom:none;}
  .avatar{width:32px;height:32px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;
    justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
  .toggle-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);}
  .toggle-row:last-child{border-bottom:none;}
  .toggle-row .label{font-size:14px;}
  .toggle-row .desc{font-size:11px;color:var(--ink-soft);margin-top:2px;}
  .switch{position:relative;width:44px;height:26px;background:var(--line);border-radius:20px;flex-shrink:0;transition:background .15s;}
  .switch.on{background:var(--safe);}
  .switch .knob{position:absolute;top:2px;left:2px;width:22px;height:22px;background:#fff;border-radius:50%;transition:left .15s;}
  .switch.on .knob{left:20px;}
  select.mini{padding:8px 10px;border-radius:8px;border:1px solid var(--line);font-size:13px;background:#fff;}

  /* ---- Game screen ---- */
  .topbar{display:flex;justify-content:space-between;align-items:center;padding:10px 4px;position:sticky;top:0;
    background:var(--bg);z-index:5;}
  .topbar .code{font-size:12px;color:var(--ink-soft);letter-spacing:.15em;}
  .turn-banner{background:var(--ink);color:#fff;border-radius:12px;padding:12px 14px;margin-bottom:12px;
    display:flex;justify-content:space-between;align-items:center;}
  .turn-banner .who{font-size:15px;font-weight:700;}
  .turn-banner .who .name{color:#F2D98C;}
  .timer-badge{font-size:12px;background:rgba(255,255,255,.15);padding:4px 10px;border-radius:20px;}

  .players-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px;}
  .player-card{flex-shrink:0;width:128px;background:var(--paper);border:1px solid var(--line);border-radius:12px;
    padding:10px;position:relative;}
  .player-card.current{border-color:var(--gold);box-shadow:0 0 0 2px rgba(194,154,59,.25);}
  .player-card.bankrupt{opacity:.4;}
  .player-card .pname{font-size:13px;font-weight:700;display:flex;align-items:center;gap:5px;}
  .player-card .pmoney{font-size:15px;font-weight:900;color:var(--navy);margin-top:4px;}
  .player-card .pmeta{font-size:10px;color:var(--ink-soft);margin-top:3px;}
  .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

  .section-title{font-size:12px;letter-spacing:.15em;color:var(--ink-soft);margin:18px 0 8px;font-weight:700;}

  /* ---- Board: vertical rail-map style ---- */
  .board{position:relative;padding-left:26px;}
  .board::before{content:"";position:absolute;left:9px;top:6px;bottom:6px;width:3px;background:var(--line);border-radius:3px;}
  .tile{position:relative;display:flex;align-items:center;gap:10px;padding:9px 0;min-height:40px;}
  .tile .station{position:absolute;left:-26px;width:20px;height:20px;border-radius:50%;background:var(--paper);
    border:3px solid var(--ink-soft);display:flex;align-items:center;justify-content:center;}
  .tile.owned-mine .station{border-color:var(--safe);}
  .tile.owned-other .station{border-color:var(--danger);}
  .tile .group-chip{width:8px;align-self:stretch;border-radius:4px;flex-shrink:0;}
  .tile .info{flex:1;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:8px 10px;}
  .tile .tname{font-size:13px;font-weight:700;}
  .tile .tmeta{font-size:10px;color:var(--ink-soft);margin-top:2px;}
  .tile .tokens{display:flex;gap:3px;margin-top:4px;}
  .tile .token{width:14px;height:14px;border-radius:50%;color:#fff;font-size:8px;display:flex;align-items:center;
    justify-content:center;font-weight:700;flex-shrink:0;}
  .tile.special .info{background:#FBF7ED;}

  .actionbar{position:sticky;bottom:0;background:var(--bg);padding-top:10px;margin-top:16px;}
  .actionbar .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .log-box{max-height:150px;overflow-y:auto;background:var(--paper);border:1px solid var(--line);border-radius:10px;
    padding:10px 12px;font-size:12px;color:var(--ink-soft);}
  .log-box div{padding:3px 0;border-bottom:1px dashed var(--line);}
  .log-box div:last-child{border-bottom:none;}

  .modal-back{position:fixed;inset:0;background:rgba(31,42,68,.55);display:flex;align-items:flex-end;justify-content:center;z-index:20;}
  .modal{background:var(--paper);border-radius:18px 18px 0 0;padding:22px 18px 26px;width:100%;max-width:520px;}
  .modal h3{font-size:17px;}
  .modal .amount{font-size:26px;font-weight:900;color:var(--navy);margin:10px 0;}
  .hidden{display:none !important;}
</style>
</head>
<body>
<div id="app">

  <!-- ================= TITLE SCREEN ================= -->
  <section class="screen active" id="screen-title">
    <div class="brand">
      <div class="eyebrow">JAPAN RAIL MONOPOLY</div>
      <h1>日本縦断モノポリー</h1>
      <div class="sub">友達とルームを作って、スマホでオンライン対戦</div>
    </div>

    <div class="card">
      <h3>ルームを作る</h3>
      <div class="field">
        <label>あなたの名前</label>
        <input id="create-name" maxlength="10" placeholder="例:たろう">
      </div>
      <button class="btn btn-primary" id="btn-create">ルームを作成</button>
    </div>

    <div class="divider">または</div>

    <div class="card">
      <h3>ルームに参加</h3>
      <div class="field">
        <label>ルームコード</label>
        <input id="join-code" maxlength="6" placeholder="例:AB12CD" style="text-transform:uppercase;letter-spacing:.1em;">
      </div>
      <div class="field">
        <label>あなたの名前</label>
        <input id="join-name" maxlength="10" placeholder="例:はなこ">
      </div>
      <button class="btn btn-gold" id="btn-join">参加する</button>
    </div>
    <div class="error" id="title-error"></div>
  </section>

  <!-- ================= LOBBY SCREEN ================= -->
  <section class="screen" id="screen-lobby">
    <div class="roomcode-label">ROOM CODE</div>
    <div class="roomcode" id="lobby-code">------</div>

    <div class="card">
      <h3>参加者</h3>
      <div id="lobby-players"></div>
    </div>

    <div class="card" id="lobby-settings-card">
      <h3>ルーム設定<span id="host-badge" style="font-size:11px;color:var(--ink-soft);font-weight:400;">(ホストのみ変更可)</span></h3>

      <div class="toggle-row">
        <div><div class="label">オークション</div><div class="desc">誰も購入しない物件を競売にかける</div></div>
        <div class="switch" data-setting="auctionEnabled"><div class="knob"></div></div>
      </div>
      <div class="toggle-row">
        <div><div class="label">家・ホテルの在庫制限</div><div class="desc">家32軒・ホテル12軒までの取り合いあり</div></div>
        <div class="switch" data-setting="houseLimitEnabled"><div class="knob"></div></div>
      </div>
      <div class="toggle-row">
        <div><div class="label">ゾロ目ルール</div><div class="desc">ゾロ目でもう一度振れる/3連続で刑務所行き</div></div>
        <div class="switch" data-setting="doublesRuleEnabled"><div class="knob"></div></div>
      </div>
      <div class="toggle-row">
        <div><div class="label">ターン時間制限</div><div class="desc">60秒操作がなければ自動的にターンを飛ばす</div></div>
        <div class="switch" data-setting="turnTimerEnabled"><div class="knob"></div></div>
      </div>
      <div class="toggle-row">
        <div><div class="label">勝利条件</div><div class="desc">最後の1人まで/規定ターン数で資産最大</div></div>
        <select class="mini" id="win-condition-select">
          <option value="elimination">最後の1人まで</option>
          <option value="turnLimit">規定ターン数で判定</option>
        </select>
      </div>
      <div class="field" id="turn-limit-field" style="margin-top:10px;">
        <label>規定ターン数</label>
        <input id="turn-limit-count" value="30" inputmode="numeric">
      </div>
    </div>

    <button class="btn btn-primary" id="btn-start-game">ゲーム開始</button>
    <div class="error" id="lobby-error"></div>
  </section>

  <!-- ================= GAME SCREEN ================= -->
  <section class="screen" id="screen-game">
    <div class="topbar">
      <div class="code">ROOM <b id="game-code"></b></div>
      <div class="code" id="game-status"></div>
    </div>

    <div class="turn-banner">
      <div class="who">今のターン: <span class="name" id="turn-player-name">-</span></div>
      <div class="timer-badge hidden" id="timer-badge">60</div>
    </div>

    <div class="players-scroll" id="players-scroll"></div>

    <div class="section-title">路線図(盤面)</div>
    <div class="board" id="board"></div>

    <div class="actionbar">
      <div id="action-slot"></div>
      <div class="section-title">ログ</div>
      <div class="log-box" id="log-box"></div>
    </div>
  </section>

</div>

<div class="modal-back hidden" id="modal-back">
  <div class="modal" id="modal-content"></div>
</div>

<!-- Firebase (compat SDK) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
/* =========================================================
   ここを、あなたのFirebaseプロジェクトの設定に置き換えてください
   Firebaseコンソール > プロジェクトの設定 > マイアプリ で取得できます
========================================================= */
// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyDrCQQN5Qrldp0uMpsAjct-b3HAj3Td_IY",
  authDomain: "monopoly-15336.firebaseapp.com",
  databaseURL: "https://monopoly-15336-default-rtdb.firebaseio.com",
  projectId: "monopoly-15336",
  storageBucket: "monopoly-15336.firebasestorage.app",
  messagingSenderId: "955697337253",
  appId: "1:955697337253:web:8907b242fc286d1bc20e4c"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);

/* ================= 盤面データ ================= */
const GROUP_COLOR = {
  brown:'var(--brown)', cyan:'var(--cyan)', pink:'var(--pink)', orange:'var(--orange)',
  red:'var(--red)', yellow:'var(--yellow)', green:'var(--green)', navy:'var(--navy)'
};
const GROUP_HOUSECOST = { brown:50, cyan:50, pink:100, orange:100, red:150, yellow:150, green:200, navy:200 };

function mk(id,name,type,extra){ return Object.assign({id,name,type},extra||{}); }

const BOARD = [
  mk(0,'スタート(GO)','go'),
  mk(1,'稚内','property',{group:'brown',price:60}),
  mk(2,'共同募金','chest'),
  mk(3,'釧路','property',{group:'brown',price:60}),
  mk(4,'所得税','tax',{amount:200}),
  mk(5,'北海道新幹線','railroad',{price:200}),
  mk(6,'旭川','property',{group:'cyan',price:100}),
  mk(7,'チャンス','chance'),
  mk(8,'小樽','property',{group:'cyan',price:100}),
  mk(9,'函館','property',{group:'cyan',price:120}),
  mk(10,'刑務所(見学のみ)','jailVisit'),
  mk(11,'仙台','property',{group:'pink',price:140}),
  mk(12,'電力会社','utility',{price:150}),
  mk(13,'盛岡','property',{group:'pink',price:140}),
  mk(14,'山形','property',{group:'pink',price:160}),
  mk(15,'東北新幹線','railroad',{price:200}),
  mk(16,'新潟','property',{group:'orange',price:180}),
  mk(17,'共同募金','chest'),
  mk(18,'金沢','property',{group:'orange',price:180}),
  mk(19,'松本','property',{group:'orange',price:200}),
  mk(20,'無料駐車場','freeParking'),
  mk(21,'名古屋','property',{group:'red',price:220}),
  mk(22,'チャンス','chance'),
  mk(23,'京都','property',{group:'red',price:220}),
  mk(24,'奈良','property',{group:'red',price:240}),
  mk(25,'東海道新幹線','railroad',{price:200}),
  mk(26,'大阪','property',{group:'yellow',price:260}),
  mk(27,'神戸','property',{group:'yellow',price:260}),
  mk(28,'水道局','utility',{price:150}),
  mk(29,'広島','property',{group:'yellow',price:280}),
  mk(30,'刑務所へ行く','goToJail'),
  mk(31,'福岡','property',{group:'green',price:300}),
  mk(32,'熊本','property',{group:'green',price:300}),
  mk(33,'共同募金','chest'),
  mk(34,'那覇','property',{group:'green',price:320}),
  mk(35,'山陽新幹線','railroad',{price:200}),
  mk(36,'チャンス','chance'),
  mk(37,'横浜','property',{group:'navy',price:350}),
  mk(38,'贅沢税','tax',{amount:100}),
  mk(39,'東京','property',{group:'navy',price:400}),
];
BOARD.forEach(t=>{ if(t.type==='property'){ t.baseRent = Math.round(t.price/10); t.houseCost = GROUP_HOUSECOST[t.group]; }});

const RAIL_RENT = [0,25,50,100,200];
const PLAYER_COLORS = ['#2D4373','#C0392B','#3C8C5E','#C29A3B','#8B5E3C','#4FB3D9'];

/* ================= 状態 ================= */
let ROOM_CODE = null;
let MY_UID = null;
let MY_NAME = null;
let IS_HOST = false;
let roomRef = null;
let roomData = null;
let turnTimerHandle = null;
let turnTimerSecondsLeft = 60;

function $(id){ return document.getElementById(id); }
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $(id).classList.add('active');
}
function randomRoomCode(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s=''; for(let i=0;i<6;i++) s+=chars[Math.floor(Math.random()*chars.length)];
  return s;
}

/* ================= 認証 ================= */
function ensureAuth(){
  return new Promise((resolve)=>{
    auth.onAuthStateChanged(user=>{
      if(user){ MY_UID = user.uid; resolve(user.uid); }
      else { auth.signInAnonymously().catch(err=>{
        $('title-error').textContent = '認証に失敗しました: '+err.message;
      }); }
    });
  });
}

/* ================= ルーム作成 ================= */
$('btn-create').addEventListener('click', async ()=>{
  const name = $('create-name').value.trim();
  if(!name){ $('title-error').textContent='名前を入力してください'; return; }
  $('title-error').textContent='';
  await ensureAuth();
  MY_NAME = name;
  ROOM_CODE = randomRoomCode();
  IS_HOST = true;
  roomRef = db.ref('rooms/'+ROOM_CODE);

  const initialPlayers = {};
  initialPlayers[MY_UID] = {
    name: MY_NAME, order:0, position:0, money:1500, inJail:false, jailTurns:0,
    getOutOfJailCards:0, bankrupt:false, connected:true, colorIndex:0
  };

  await roomRef.set({
    status:'waiting',
    createdAt: Date.now(),
    settings:{
      hostUid: MY_UID,
      auctionEnabled:true, houseLimitEnabled:false, doublesRuleEnabled:true,
      turnTimerEnabled:true, winCondition:'elimination', turnLimitCount:30
    },
    players: initialPlayers
  });

  enterLobby();
});

/* ================= ルーム参加 ================= */
$('btn-join').addEventListener('click', async ()=>{
  const code = $('join-code').value.trim().toUpperCase();
  const name = $('join-name').value.trim();
  if(!code || !name){ $('title-error').textContent='ルームコードと名前を入力してください'; return; }
  $('title-error').textContent='';
  await ensureAuth();

  const snap = await db.ref('rooms/'+code).get();
  if(!snap.exists()){ $('title-error').textContent='そのルームコードは見つかりません'; return; }
  const data = snap.val();
  if(data.status!=='waiting'){ $('title-error').textContent='このルームはすでにゲームが開始されています'; return; }
  const existingPlayers = data.players || {};
  if(existingPlayers[MY_UID]){
    // 既に参加済み(再接続) -> そのまま入る
  } else {
    const count = Object.keys(existingPlayers).length;
    if(count>=6){ $('title-error').textContent='このルームは満員です(最大6人)'; return; }
    await db.ref('rooms/'+code+'/players/'+MY_UID).set({
      name, order:count, position:0, money:1500, inJail:false, jailTurns:0,
      getOutOfJailCards:0, bankrupt:false, connected:true, colorIndex:count
    });
  }
  MY_NAME = name;
  ROOM_CODE = code;
  roomRef = db.ref('rooms/'+ROOM_CODE);
  IS_HOST = data.settings.hostUid === MY_UID;
  enterLobby();
});

/* ================= ロビー ================= */
function enterLobby(){
  showScreen('screen-lobby');
  $('lobby-code').textContent = ROOM_CODE;
  $('lobby-settings-card').style.opacity = IS_HOST ? '1' : '.55';
  $('lobby-settings-card').style.pointerEvents = IS_HOST ? 'auto' : 'none';
  $('btn-start-game').style.display = IS_HOST ? 'block' : 'none';
  listenRoom();
}

document.querySelectorAll('#lobby-settings-card .switch').forEach(sw=>{
  sw.addEventListener('click', ()=>{
    if(!IS_HOST || !roomRef) return;
    const key = sw.dataset.setting;
    const current = sw.classList.contains('on');
    roomRef.child('settings/'+key).set(!current);
  });
});
$('win-condition-select').addEventListener('change', (e)=>{
  if(!IS_HOST || !roomRef) return;
  roomRef.child('settings/winCondition').set(e.target.value);
});
$('turn-limit-count').addEventListener('change', (e)=>{
  if(!IS_HOST || !roomRef) return;
  const n = parseInt(e.target.value,10) || 30;
  roomRef.child('settings/turnLimitCount').set(n);
});

function renderLobby(){
  const players = roomData.players || {};
  const list = Object.keys(players).sort((a,b)=>players[a].order-players[b].order);
  $('lobby-players').innerHTML = list.map(uid=>{
    const p = players[uid];
    return `<div class="player-row">
      <div class="avatar" style="background:${PLAYER_COLORS[p.colorIndex % PLAYER_COLORS.length]}">${p.name[0]}</div>
      <div>${p.name}${uid===roomData.settings.hostUid?' <span style="color:var(--gold);font-size:11px;">(ホスト)</span>':''}</div>
    </div>`;
  }).join('');

  const s = roomData.settings;
  document.querySelectorAll('#lobby-settings-card .switch').forEach(sw=>{
    const key = sw.dataset.setting;
    sw.classList.toggle('on', !!s[key]);
  });
  $('win-condition-select').value = s.winCondition;
  $('turn-limit-count').value = s.turnLimitCount;
  $('turn-limit-field').style.display = s.winCondition==='turnLimit' ? 'block':'none';
}

$('btn-start-game').addEventListener('click', async ()=>{
  if(!IS_HOST) return;
  const players = roomData.players || {};
  const uids = Object.keys(players);
  if(uids.length<2){ $('lobby-error').textContent='2人以上集まってから開始してください'; return; }

  // シャッフルして手番順を決定
  const shuffled = [...uids].sort(()=>Math.random()-0.5);
  const updates = {};
  shuffled.forEach((uid,i)=>{ updates['players/'+uid+'/order'] = i; });
  BOARD.forEach(t=>{
    if(t.type==='property'||t.type==='railroad'||t.type==='utility'){
      updates['tiles/'+t.id] = { owner:null, houses:0, hotel:false, mortgaged:false };
    }
  });
  updates['turn/currentUid'] = shuffled[0];
  updates['turn/phase'] = 'rolling';
  updates['turn/diceResult'] = null;
  updates['turn/doublesStreak'] = 0;
  updates['status'] = 'playing';
  updates['log'] = { '0': { message:'ゲームが開始されました', timestamp:Date.now() } };

  await roomRef.update(updates);
});

/* ================= ルーム購読 ================= */
function listenRoom(){
  roomRef.on('value', snap=>{
    roomData = snap.val();
    if(!roomData) return;
    if(roomData.status==='waiting'){
      showScreen('screen-lobby');
      renderLobby();
    } else if(roomData.status==='playing'){
      showScreen('screen-game');
      renderGame();
    }
  });
}

/* ================= ゲーム描画 ================= */
function myPlayer(){ return roomData.players[MY_UID]; }
function isMyTurn(){ return roomData.turn && roomData.turn.currentUid===MY_UID; }

function renderGame(){
  $('game-code').textContent = ROOM_CODE;
  $('game-status').textContent = roomData.status==='playing' ? 'プレイ中' : '';

  const players = roomData.players;
  const turn = roomData.turn || {};
  const currentP = players[turn.currentUid];
  $('turn-player-name').textContent = currentP ? currentP.name : '-';

  // プレイヤーカード
  const order = Object.keys(players).sort((a,b)=>players[a].order-players[b].order);
  $('players-scroll').innerHTML = order.map(uid=>{
    const p = players[uid];
    const color = PLAYER_COLORS[p.colorIndex % PLAYER_COLORS.length];
    const propCount = Object.values(roomData.tiles||{}).filter(t=>t.owner===uid).length;
    return `<div class="player-card ${uid===turn.currentUid?'current':''} ${p.bankrupt?'bankrupt':''}">
      <div class="pname"><span class="dot" style="background:${color}"></span>${p.name}</div>
      <div class="pmoney">¥${p.money.toLocaleString()}</div>
      <div class="pmeta">物件 ${propCount}件 ${p.inJail?'/ 服役中':''} ${p.bankrupt?'/ 破産':''}</div>
    </div>`;
  }).join('');

  // 盤面
  $('board').innerHTML = BOARD.map(t=>{
    const tileState = (roomData.tiles||{})[t.id];
    const isSpecial = !(t.type==='property'||t.type==='railroad'||t.type==='utility');
    let ownedClass = '';
    if(tileState && tileState.owner){
      ownedClass = tileState.owner===MY_UID ? 'owned-mine' : 'owned-other';
    }
    const tokensHere = order.filter(uid=>players[uid].position===t.id && !players[uid].bankrupt);
    const tokensHtml = tokensHere.map(uid=>{
      const p = players[uid];
      return `<div class="token" style="background:${PLAYER_COLORS[p.colorIndex % PLAYER_COLORS.length]}">${p.name[0]}</div>`;
    }).join('');
    const chip = t.group ? `<div class="group-chip" style="background:${GROUP_COLOR[t.group]}"></div>` : '';
    let meta = '';
    if(t.type==='property') meta = `¥${t.price} ・ 家賃¥${t.baseRent}〜`;
    else if(t.type==='railroad') meta = `¥${t.price} ・ 新幹線`;
    else if(t.type==='utility') meta = `¥${t.price} ・ 公共施設`;
    else if(t.type==='tax') meta = `支払い ¥${t.amount}`;
    else if(t.type==='chance') meta = 'チャンスカード';
    else if(t.type==='chest') meta = '共同募金カード';
    else if(t.type==='go') meta = '通過でボーナス¥200';
    return `<div class="tile ${isSpecial?'special':''} ${ownedClass}">
      <div class="station"></div>
      ${chip}
      <div class="info">
        <div class="tname">${t.name}</div>
        <div class="tmeta">${meta}</div>
        <div class="tokens">${tokensHtml}</div>
      </div>
    </div>`;
  }).join('');

  // タイマー表示
  const timerOn = roomData.settings.turnTimerEnabled;
  $('timer-badge').classList.toggle('hidden', !timerOn);

  renderActionSlot();
  renderLog();
  handleTurnTimer();
}

function renderLog(){
  const log = roomData.log || {};
  const keys = Object.keys(log).sort((a,b)=>log[b].timestamp-log[a].timestamp);
  $('log-box').innerHTML = keys.slice(0,50).map(k=>`<div>${log[k].message}</div>`).join('') || '<div>まだログはありません</div>';
}

function pushLog(message){
  const logRef = roomRef.child('log').push();
  logRef.set({ message, timestamp: Date.now() });
  // 直近50件だけ残す軽量化
  roomRef.child('log').get().then(snap=>{
    const val = snap.val()||{};
    const keys = Object.keys(val).sort((a,b)=>val[a].timestamp-val[b].timestamp);
    if(keys.length>50){
      const removeKeys = keys.slice(0, keys.length-50);
      const updates = {};
      removeKeys.forEach(k=>updates[k]=null);
      roomRef.child('log').update(updates);
    }
  });
}

/* ================= アクションパネル ================= */
function renderActionSlot(){
  const slot = $('action-slot');
  const turn = roomData.turn;
  if(!isMyTurn()){
    slot.innerHTML = `<div class="card" style="text-align:center;color:var(--ink-soft);font-size:13px;">
      ${roomData.players[turn.currentUid] ? roomData.players[turn.currentUid].name : ''} さんのターンです…</div>`;
    return;
  }
  if(turn.phase==='rolling'){
    slot.innerHTML = `<button class="btn btn-primary" id="btn-roll">🎲 サイコロを振る</button>`;
    $('btn-roll').addEventListener('click', doRollDice);
  } else if(turn.phase==='buy-decision'){
    const tile = BOARD[myPlayer().position];
    slot.innerHTML = `<div class="card">
      <div style="font-size:13px;margin-bottom:10px;"><b>${tile.name}</b> は誰も所有していません。購入しますか?(¥${tile.price})</div>
      <div class="grid">
        <button class="btn btn-gold" id="btn-buy">購入する</button>
        <button class="btn btn-ghost" id="btn-pass">見送る</button>
      </div>
    </div>`;
    $('btn-buy').addEventListener('click', doBuy);
    $('btn-pass').addEventListener('click', doPass);
  } else if(turn.phase==='resolved'){
    slot.innerHTML = `<button class="btn btn-primary" id="btn-endturn">ターンを終える</button>`;
    $('btn-endturn').addEventListener('click', ()=>advanceTurn());
  } else {
    slot.innerHTML = '';
  }
}

/* ================= ターンタイマー ================= */
function handleTurnTimer(){
  clearInterval(turnTimerHandle);
  $('timer-badge').textContent = '60';
  if(!roomData.settings.turnTimerEnabled) return;
  if(!isMyTurn()) return;
  turnTimerSecondsLeft = 60;
  turnTimerHandle = setInterval(()=>{
    turnTimerSecondsLeft--;
    $('timer-badge').textContent = String(Math.max(turnTimerSecondsLeft,0));
    if(turnTimerSecondsLeft<=0){
      clearInterval(turnTimerHandle);
      pushLog(`${myPlayer().name} さんは時間切れのためターンがスキップされました`);
      const turn = roomData.turn;
      if(turn.phase==='buy-decision') doPass();
      else advanceTurn();
    }
  },1000);
}

/* ================= サイコロ・移動 ================= */
function doRollDice(){
  const d1 = 1+Math.floor(Math.random()*6);
  const d2 = 1+Math.floor(Math.random()*6);
  const isDouble = d1===d2;
  const sum = d1+d2;
  const p = myPlayer();
  let newPos = (p.position + sum) % 40;
  const passedGo = (p.position + sum) >= 40;
  let newMoney = p.money + (passedGo ? 200 : 0);

  const updates = {};
  updates['players/'+MY_UID+'/position'] = newPos;
  updates['players/'+MY_UID+'/money'] = newMoney;
  updates['turn/diceResult'] = [d1,d2];

  let doublesStreak = (roomData.turn.doublesStreak||0);
  if(roomData.settings.doublesRuleEnabled && isDouble) doublesStreak++; else doublesStreak = 0;
  updates['turn/doublesStreak'] = doublesStreak;

  if(passedGo) pushLog(`${p.name} さんがGOを通過し¥200を受け取りました`);

  if(roomData.settings.doublesRuleEnabled && doublesStreak>=3){
    // 3連続ゾロ目 -> 刑務所へ
    updates['players/'+MY_UID+'/position'] = 10;
    updates['players/'+MY_UID+'/inJail'] = true;
    updates['turn/phase'] = 'resolved';
    roomRef.update(updates).then(()=>{
      pushLog(`${p.name} さんは3連続ゾロ目のため刑務所へ送られました`);
    });
    return;
  }

  roomRef.update(updates).then(()=>{
    resolveTile(newPos, isDouble && roomData.settings.doublesRuleEnabled);
  });
}

function resolveTile(pos, canRollAgain){
  const tile = BOARD[pos];
  const tileState = (roomData.tiles||{})[pos];
  const p = myPlayer();

  if(tile.type==='property' || tile.type==='railroad' || tile.type==='utility'){
    if(!tileState || !tileState.owner){
      roomRef.child('turn/phase').set('buy-decision');
      return;
    } else if(tileState.owner===MY_UID){
      pushLog(`${p.name} さんは自分の所有地(${tile.name})に止まりました`);
      finishResolve(canRollAgain);
    } else {
      const rent = calcRent(tile, tileState, roomData.turn.diceResult);
      const owner = roomData.players[tileState.owner];
      const updates = {};
      updates['players/'+MY_UID+'/money'] = p.money - rent;
      updates['players/'+tileState.owner+'/money'] = owner.money + rent;
      roomRef.update(updates).then(()=>{
        pushLog(`${p.name} さんは ${tile.name} で ${owner.name} さんに家賃¥${rent}を支払いました`);
        finishResolve(canRollAgain);
      });
    }
  } else if(tile.type==='tax'){
    const updates = {};
    updates['players/'+MY_UID+'/money'] = p.money - tile.amount;
    roomRef.update(updates).then(()=>{
      pushLog(`${p.name} さんは${tile.name}として¥${tile.amount}を支払いました`);
      finishResolve(canRollAgain);
    });
  } else if(tile.type==='goToJail'){
    const updates = {};
    updates['players/'+MY_UID+'/position'] = 10;
    updates['players/'+MY_UID+'/inJail'] = true;
    roomRef.update(updates).then(()=>{
      pushLog(`${p.name} さんは刑務所へ送られました`);
      finishResolve(false);
    });
  } else {
    // GO / chest / chance / freeParking / jailVisit は次回実装
    pushLog(`${p.name} さんは ${tile.name} に止まりました(このマスの詳細な効果は次回実装予定)`);
    finishResolve(canRollAgain);
  }
}

function finishResolve(canRollAgain){
  if(canRollAgain){
    pushLog(`${myPlayer().name} さんはゾロ目なのでもう一度サイコロを振れます`);
    roomRef.child('turn/phase').set('rolling');
  } else {
    roomRef.child('turn/phase').set('resolved');
  }
}

function calcRent(tile, tileState, diceResult){
  if(tile.type==='railroad'){
    const ownerUid = tileState.owner;
    let railCount = 0;
    BOARD.forEach(b=>{ if(b.type==='railroad' && roomData.tiles[b.id] && roomData.tiles[b.id].owner===ownerUid) railCount++; });
    return RAIL_RENT[railCount] || 25;
  }
  if(tile.type==='utility'){
    const ownerUid = tileState.owner;
    let utilCount = 0;
    BOARD.forEach(b=>{ if(b.type==='utility' && roomData.tiles[b.id] && roomData.tiles[b.id].owner===ownerUid) utilCount++; });
    const diceSum = (diceResult||[1,1])[0]+(diceResult||[1,1])[1];
    return diceSum * (utilCount>=2 ? 10 : 4);
  }
  // property
  const ownerUid = tileState.owner;
  const groupTiles = BOARD.filter(b=>b.type==='property' && b.group===tile.group);
  const hasMonopoly = groupTiles.every(b=>roomData.tiles[b.id] && roomData.tiles[b.id].owner===ownerUid);
  const houses = tileState.houses||0;
  if(tileState.hotel) return tile.baseRent*16;
  if(houses===0) return hasMonopoly ? tile.baseRent*2 : tile.baseRent;
  return tile.baseRent*(2+houses*2);
}

/* ================= 購入/見送り ================= */
function doBuy(){
  const p = myPlayer();
  const tile = BOARD[p.position];
  if(p.money < tile.price){
    pushLog(`${p.name} さんは資金不足のため ${tile.name} を購入できませんでした`);
    roomRef.child('turn/phase').set('resolved');
    return;
  }
  const updates = {};
  updates['players/'+MY_UID+'/money'] = p.money - tile.price;
  updates['tiles/'+tile.id+'/owner'] = MY_UID;
  updates['turn/phase'] = 'resolved';
  roomRef.update(updates).then(()=>{
    pushLog(`${p.name} さんが ${tile.name} を¥${tile.price}で購入しました`);
  });
}
function doPass(){
  const p = myPlayer();
  const tile = BOARD[p.position];
  pushLog(`${p.name} さんは ${tile.name} の購入を見送りました${roomData.settings.auctionEnabled?'(オークション機能は次回実装予定)':''}`);
  roomRef.child('turn/phase').set('resolved');
}

/* ================= ターン送り ================= */
function advanceTurn(){
  const players = roomData.players;
  const order = Object.keys(players).sort((a,b)=>players[a].order-players[b].order);
  const curIdx = order.indexOf(roomData.turn.currentUid);
  let nextIdx = curIdx;
  for(let i=1;i<=order.length;i++){
    const cand = (curIdx+i)%order.length;
    if(!players[order[cand]].bankrupt){ nextIdx = cand; break; }
  }
  const nextUid = order[nextIdx];
  roomRef.update({
    'turn/currentUid': nextUid,
    'turn/phase': 'rolling',
    'turn/diceResult': null,
    'turn/doublesStreak': 0
  });
}

/* 起動時に認証だけ先行しておく(再接続をスムーズにするため) */
ensureAuth();
</script>
